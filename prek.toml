[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "check-yaml" },
    { id = "end-of-file-fixer" },
    { id = "check-case-conflict" },
    { id = "check-illegal-windows-names" },
    { id = "check-toml" },
    { id = "check-vcs-permalinks" },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
    {
        id = "cargo-fmt",
        name = "cargo fmt",
        language = "system",
        entry = "cargo fmt",
        pass_filenames = false,
    },
]
